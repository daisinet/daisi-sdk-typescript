<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAISI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p { font-size: 0.8rem; color: #94a3b8; margin-top: 0.25rem; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #3b82f6;
      color: #fff;
    }
    .msg.ai {
      align-self: flex-start;
      background: #1e293b;
      border: 1px solid #334155;
    }
    .msg.error {
      align-self: center;
      background: #7f1d1d;
      color: #fca5a5;
      font-size: 0.85rem;
    }
    #input-area {
      padding: 1rem 1.5rem;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 0.75rem;
    }
    #prompt {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
    }
    #prompt:focus { border-color: #3b82f6; }
    #prompt:disabled { opacity: 0.5; }
    button {
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: default; }
    #setup {
      padding: 2rem;
      max-width: 28rem;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    #setup label { font-size: 0.85rem; color: #94a3b8; }
    #setup input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
    }
    #setup input:focus { border-color: #3b82f6; }
    #chat { display: none; flex-direction: column; height: 100vh; }
  </style>
</head>
<body>

  <!-- Setup screen -->
  <div id="setup">
    <h2>DAISI Browser Chat</h2>
    <p style="color: #94a3b8; font-size: 0.9rem;">
      Enter your client key to start chatting. Use a client key (not a secret
      key) in the browser.
    </p>
    <div>
      <label for="client-key">Client Key</label>
      <input id="client-key" type="password" placeholder="ck-..." />
    </div>
    <button id="connect-btn" onclick="connect()">Connect</button>
  </div>

  <!-- Chat screen -->
  <div id="chat">
    <header>
      <h1>DAISI Chat</h1>
      <p>Streaming inference via grpc-web</p>
    </header>
    <div id="messages"></div>
    <div id="input-area">
      <input id="prompt" type="text" placeholder="Type a message..."
             onkeydown="if(event.key==='Enter')sendMessage()" disabled />
      <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>

  <script type="module">
    import {
      createDaisiClient,
      webTransportFactory,
    } from "@daisi/sdk/web";

    let inference = null;

    // Make functions available globally
    window.connect = async function () {
      const clientKey = document.getElementById("client-key").value.trim();
      if (!clientKey) return;

      const btn = document.getElementById("connect-btn");
      btn.disabled = true;
      btn.textContent = "Connecting...";

      try {
        const client = await createDaisiClient({
          transportFactory: webTransportFactory,
          clientKey,
        });

        inference = client.inference.create();
        await inference.sessionManager.negotiateSession();

        document.getElementById("setup").style.display = "none";
        document.getElementById("chat").style.display = "flex";
        document.getElementById("prompt").disabled = false;
        document.getElementById("send-btn").disabled = false;
        document.getElementById("prompt").focus();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Connect";
        alert("Connection failed: " + (err.message ?? err));
      }
    };

    window.sendMessage = async function () {
      const input = document.getElementById("prompt");
      const text = input.value.trim();
      if (!text || !inference) return;

      input.value = "";
      input.disabled = true;
      document.getElementById("send-btn").disabled = true;

      appendMessage(text, "user");
      const aiMsg = appendMessage("", "ai");

      try {
        for await (const token of inference.send(text)) {
          if (token.Content) {
            aiMsg.textContent += token.Content;
            scrollToBottom();
          }
        }
      } catch (err) {
        appendMessage("Error: " + (err.message ?? err), "error");
      }

      input.disabled = false;
      document.getElementById("send-btn").disabled = false;
      input.focus();
    };

    function appendMessage(text, type) {
      const el = document.createElement("div");
      el.className = "msg " + type;
      el.textContent = text;
      document.getElementById("messages").appendChild(el);
      scrollToBottom();
      return el;
    }

    function scrollToBottom() {
      const msgs = document.getElementById("messages");
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>

</body>
</html>
